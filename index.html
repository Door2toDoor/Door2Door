<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Door2Door</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#f36c21,#f89a55);} 
.container{max-width:1300px;margin:auto;padding:20px}
.header{color:white;margin-bottom:20px}
.grid{display:grid;grid-template-columns:220px 220px 1fr 320px;gap:20px}
.card{background:white;border-radius:20px;padding:15px;box-shadow:0 10px 20px rgba(0,0,0,.15)}
button{cursor:pointer;border:none;border-radius:12px;padding:10px}
.storeBtn,.catBtn{width:100%;margin-bottom:8px;background:#f2f2f2}
.product{border:1px solid #eee;border-radius:16px;padding:12px;margin-bottom:10px}
.product button{background:#0F2A43;color:white}
.cartItem{background:rgba(255,255,255,.1);padding:10px;border-radius:10px;margin-bottom:8px}
.cart{background:#0F2A43;color:white;border-radius:20px;padding:15px}
input,textarea{width:100%;padding:8px;border-radius:8px;border:1px solid #ddd;margin-bottom:8px}
.tip button{margin-right:5px}
.totalBox{background:rgba(255,255,255,.15);padding:10px;border-radius:12px;margin-top:10px}
.whatsapp{background:#25D366;color:white;width:100%;margin-top:10px;font-weight:bold}
</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>Door2Door</h1>
<p>Fast delivery in Regensburg</p>
</div>

<div class="grid">

<div class="card" id="stores"></div>
<div class="card" id="categories"></div>
<div class="card" id="products"></div>
<div class="cart" id="cart"></div>

</div>
</div>

<script>

const STORES=["All Stores","Atlantic Arabic Market","Bosra Market","Netto","Lidl"]
const CATEGORIES=["All","Bread","Dairy","Rice","Vegetables","Drinks","Snacks"]

const PRODUCTS=[
{id:1,store:"Atlantic Arabic Market",category:"Bread",name:"Arabic Bread",price:2.5,emoji:"🥖"},
{id:2,store:"Atlantic Arabic Market",category:"Dairy",name:"Labneh",price:3.2,emoji:"🥛"},
{id:3,store:"Bosra Market",category:"Snacks",name:"Falafel",price:6.9,emoji:"🧆"},
{id:4,store:"Netto",category:"Dairy",name:"Milk",price:1.35,emoji:"🥛"},
{id:5,store:"Netto",category:"Vegetables",name:"Tomatoes",price:2.2,emoji:"🍅"},
{id:6,store:"Lidl",category:"Drinks",name:"Water",price:0.89,emoji:"💧"},
{id:7,store:"Lidl",category:"Snacks",name:"Chocolate",price:1.9,emoji:"🍫"}
]

let store="All Stores"
let category="All"
let cart=[]
let tip=0

const DELIVERY=2.5
const MIN_ORDER=10

function renderStores(){
let html="<h3>Stores</h3>"
STORES.forEach(s=>{
html+=`<button class='storeBtn' onclick="store='${s}';renderProducts()">${s}</button>`
})
document.getElementById("stores").innerHTML=html
}

function renderCategories(){
let html="<h3>Categories</h3>"
CATEGORIES.forEach(c=>{
html+=`<button class='catBtn' onclick="category='${c}';renderProducts()">${c}</button>`
})
document.getElementById("categories").innerHTML=html
}

function renderProducts(){
let list=PRODUCTS.filter(p=>(store==='All Stores'||p.store===store)&&(category==='All'||p.category===category))
let html="<h3>Products</h3>"
list.forEach(p=>{
html+=`<div class='product'>
<div style='font-size:30px'>${p.emoji}</div>
<b>${p.name}</b><br>
€${p.price}
<br>
<button onclick="addToCart(${p.id})">Add</button>
</div>`
})
document.getElementById("products").innerHTML=html
}

function addToCart(id){
let item=cart.find(i=>i.id===id)
if(item){item.qty++}
else{
let p=PRODUCTS.find(p=>p.id===id)
cart.push({...p,qty:1})
}
renderCart()
}

function changeQty(id,d){
let item=cart.find(i=>i.id===id)
item.qty+=d
if(item.qty<=0)cart=cart.filter(i=>i.id!==id)
renderCart()
}

function renderCart(){
let html="<h3>Cart</h3>"
cart.forEach(i=>{
html+=`<div class='cartItem'>${i.name}
<br>
<button onclick="changeQty(${i.id},-1)">-</button>
${i.qty}
<button onclick="changeQty(${i.id},1)">+</button>
</div>`
})

let itemsTotal=cart.reduce((s,i)=>s+i.price*i.qty,0)
let finalTotal=itemsTotal+DELIVERY+tip

html+=`

<h4>Delivery info</h4>
<input id='name' placeholder='Name'>
<input id='phone' placeholder='Phone'>
<input id='street' placeholder='Street'>
<textarea id='note' placeholder='Note'></textarea>

<div class='tip'>Tip:
<button onclick='tip=0;renderCart()'>0</button>
<button onclick='tip=1;renderCart()'>1</button>
<button onclick='tip=2;renderCart()'>2</button>
<button onclick='tip=5;renderCart()'>5</button>
</div>

<div class='totalBox'>
Items €${itemsTotal.toFixed(2)}<br>
Delivery €${DELIVERY}<br>
Tip €${tip}<br>
<b>Total €${finalTotal.toFixed(2)}</b>
</div>

<button class='whatsapp' onclick='sendOrder()'>Send via WhatsApp</button>
`

document.getElementById("cart").innerHTML=html
}

function sendOrder(){
let itemsTotal=cart.reduce((s,i)=>s+i.price*i.qty,0)
if(itemsTotal<MIN_ORDER){alert("Minimum order €"+MIN_ORDER);return}

let msg="New Door2Door Order\n"
msg+="Name: "+document.getElementById("name").value+"\n"
msg+="Phone: "+document.getElementById("phone").value+"\n"
msg+="Street: "+document.getElementById("street").value+"\n\n"

cart.forEach(i=>{
msg+=i.name+" x"+i.qty+"\n"
})

msg+="\nTotal: €"+(itemsTotal+DELIVERY+tip).toFixed(2)

window.open("https://wa.me/4917672105595?text="+encodeURIComponent(msg))
}

renderStores()
renderCategories()
renderProducts()
renderCart()

</script>

</body>
</html>
