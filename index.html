<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Door2Door</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #171717;
      color: #fff;
    }
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 16px 16px 110px;
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      position: sticky;
      top: 0;
      background: #171717;
      z-index: 10;
    }
    .back-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: #232323;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .search-wrap {
      position: relative;
      flex: 1;
    }
    .search-wrap input {
      width: 100%;
      border: none;
      border-radius: 999px;
      background: #2b2b2b;
      color: #fff;
      padding: 18px 20px 18px 58px;
      font-size: 24px;
      outline: none;
    }
    .search-wrap .icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 28px;
      color: #e6902f;
    }
    .store-tabs {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 16px 0 6px;
      scrollbar-width: none;
    }
    .store-tabs::-webkit-scrollbar { display: none; }
    .store-tab {
      white-space: nowrap;
      border: none;
      border-radius: 18px;
      background: #2b2b2b;
      color: #fff;
      padding: 12px 16px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }
    .store-tab.active {
      background: #fff;
      color: #111;
    }
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      padding: 10px 0 6px;
    }
    .hero h1 {
      margin: 0;
      font-size: 38px;
    }
    .hero p {
      margin: 6px 0 0;
      color: rgba(255,255,255,.7);
      font-size: 18px;
    }
    .hero-badge {
      background: #f36c21;
      color: white;
      border-radius: 16px;
      padding: 12px 16px;
      font-weight: 700;
      display: none;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 16px;
    }
    .card {
      border: none;
      border-radius: 28px;
      background: #2b2b2b;
      color: #fff;
      padding: 14px;
      text-align: left;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(0,0,0,.2);
    }
    .img-box {
      height: 160px;
      border-radius: 22px;
      background: #f2efe9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      box-shadow: inset 0 2px 8px rgba(0,0,0,.06);
    }
    .card-title {
      margin-top: 14px;
      min-height: 58px;
      font-size: 22px;
      line-height: 1.18;
    }
    .pill {
      display: inline-block;
      margin-top: 8px;
      background: #f2d247;
      color: #111;
      border-radius: 12px;
      padding: 6px 10px;
      font-weight: 700;
      font-size: 18px;
    }
    .back-categories {
      display: inline-block;
      margin: 18px 0 4px;
      background: #2b2b2b;
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 12px 16px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }
    .product-card .img-box {
      height: 135px;
      font-size: 54px;
    }
    .product-price {
      margin-top: 8px;
      color: #f2d247;
      font-size: 22px;
      font-weight: 800;
    }
    .add-btn {
      margin-top: 12px;
      width: 100%;
      border: none;
      border-radius: 18px;
      background: #f36c21;
      color: #fff;
      padding: 13px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }
    .cart-bar {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      background: #f36c21;
      color: #fff;
      border-radius: 26px;
      padding: 14px;
      box-shadow: 0 20px 40px rgba(0,0,0,.35);
      z-index: 20;
    }
    .cart-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .cart-head small { color: rgba(255,255,255,.82); }
    .continue-btn {
      margin-top: 10px;
      width: 100%;
      border: none;
      border-radius: 18px;
      background: #fff;
      color: #f36c21;
      padding: 14px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }
    .drawer {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      display: none;
      align-items: end;
      justify-content: center;
      z-index: 30;
    }
    .drawer.show { display: flex; }
    .drawer-panel {
      width: min(720px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: #fff;
      color: #111;
      border-radius: 28px 28px 0 0;
      padding: 18px;
    }
    .drawer-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .close-btn {
      border: none;
      background: #f2f2f2;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
    }
    .cart-item {
      border: 1px solid #eee;
      border-radius: 18px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .cart-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }
    .qty {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .qty button {
      border: none;
      background: #2b2b2b;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
    }
    .form input, .form textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 10px;
      font-family: inherit;
    }
    .form textarea { min-height: 90px; resize: vertical; }
    .tip-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .tip-grid button {
      border: none;
      background: #f2f2f2;
      border-radius: 14px;
      padding: 12px 8px;
      font-weight: 700;
      cursor: pointer;
    }
    .tip-grid button.active {
      background: #f36c21;
      color: #fff;
    }
    .summary {
      border-radius: 18px;
      background: #f7f7f7;
      padding: 14px;
      margin-top: 8px;
    }
    .summary div {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .summary div:last-child {
      margin-bottom: 0;
      padding-top: 8px;
      border-top: 1px solid #ddd;
      font-weight: 800;
    }
    .wa-btn {
      margin-top: 14px;
      width: 100%;
      border: none;
      border-radius: 18px;
      background: #25D366;
      color: #fff;
      padding: 15px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }
    @media (min-width: 900px) {
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .hero-badge { display: block; }
      .cart-bar {
        left: auto;
        right: 20px;
        width: 380px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <button class="back-btn">←</button>
      <div class="search-wrap">
        <span class="icon">⌕</span>
        <input id="searchInput" placeholder="Nach einem Artikel suchen" />
      </div>
    </div>

    <div id="storeTabs" class="store-tabs"></div>

    <div class="hero">
      <div>
        <h1 id="storeTitle"></h1>
        <p id="storeSubtitle"></p>
      </div>
      <div class="hero-badge" id="heroBadge"></div>
    </div>

    <button id="backToCategories" class="back-categories" style="display:none;">← Back to categories</button>
    <div id="grid" class="grid"></div>
  </div>

  <div class="cart-bar">
    <div class="cart-head">
      <div>
        <div style="font-size:18px;font-weight:800;">Cart</div>
        <small id="cartMeta">No items yet</small>
      </div>
      <div id="cartTotal" style="font-size:28px;font-weight:800;">€0.00</div>
    </div>
    <button id="continueBtn" class="continue-btn">Continue order</button>
  </div>

  <div id="drawer" class="drawer">
    <div class="drawer-panel">
      <div class="drawer-top">
        <div>
          <div style="font-size:24px;font-weight:800;">Your order</div>
          <div style="color:#666;">Regensburg only</div>
        </div>
        <button id="closeDrawer" class="close-btn">×</button>
      </div>

      <div id="cartItems"></div>

      <div class="form">
        <input id="customerName" placeholder="Name" />
        <input id="customerPhone" placeholder="Phone number" />
        <input id="customerStreet" placeholder="Street + number" />
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <input id="customerFloor" placeholder="Floor" />
          <input id="customerApartment" placeholder="Apartment" />
        </div>
        <textarea id="customerNote" placeholder="Note"></textarea>
      </div>

      <div style="font-weight:700;margin-bottom:8px;">Tip for driver</div>
      <div id="tipGrid" class="tip-grid"></div>

      <div class="summary">
        <div><span>Items</span><span id="sumItems">€0.00</span></div>
        <div><span>Delivery</span><span id="sumDelivery">€2.50</span></div>
        <div><span>Tip</span><span id="sumTip">€0.00</span></div>
        <div><span>Total</span><span id="sumTotal">€0.00</span></div>
      </div>

      <button id="waBtn" class="wa-btn">Send via WhatsApp</button>
      <div style="margin-top:10px;color:#666;font-size:13px;text-align:center;">Minimum order €10.00</div>
    </div>
  </div>

    const sampleProducts = {

      fresh: [{ id: 35, name: 'Fresh Sandwich', price: 3.9, image: '🥪' }],

    let activeStoreId = 'rewe';
    let activeCategoryId = null;
    let search = '';
    let cart = [];
    let tip = 0;

    const storeTabs = document.getElementById('storeTabs');
    const storeTitle = document.getElementById('storeTitle');
    const storeSubtitle = document.getElementById('storeSubtitle');
    const heroBadge = document.getElementById('heroBadge');
    const grid = document.getElementById('grid');
    const searchInput = document.getElementById('searchInput');
    const backToCategories = document.getElementById('backToCategories');
    const cartMeta = document.getElementById('cartMeta');
    const cartTotal = document.getElementById('cartTotal');
    const continueBtn = document.getElementById('continueBtn');
    const drawer = document.getElementById('drawer');
    const closeDrawer = document.getElementById('closeDrawer');
    const cartItems = document.getElementById('cartItems');
    const tipGrid = document.getElementById('tipGrid');
    const sumItems = document.getElementById('sumItems');
    const sumDelivery = document.getElementById('sumDelivery');
    const sumTip = document.getElementById('sumTip');
    const sumTotal = document.getElementById('sumTotal');
    const waBtn = document.getElementById('waBtn');

    function getActiveStore() {
      return stores.find(s => s.id === activeStoreId) || stores[0];
    }

    function getFilteredCategories() {
      const q = search.trim().toLowerCase();
      const categories = getActiveStore().categories;
      if (!q) return categories;
      return categories.filter(c => c.name.toLowerCase().includes(q));
    }

    function getFilteredProducts() {
      if (!activeCategoryId) return [];
      const q = search.trim().toLowerCase();
      const items = sampleProducts[activeCategoryId] || [];
      if (!q) return items;
      return items.filter(p => p.name.toLowerCase().includes(q));
    }

    function renderStoreTabs() {
      storeTabs.innerHTML = stores.map(store => `
        <button class="store-tab ${store.id === activeStoreId ? 'active' : ''}" data-store="${store.id}">${store.name}</button>
      `).join('');
      storeTabs.querySelectorAll('.store-tab').forEach(btn => {
        btn.onclick = () => {
          activeStoreId = btn.dataset.store;
          activeCategoryId = null;
          render();
        };
      });
    }

    function renderHero() {
      const s = getActiveStore();
      storeTitle.textContent = s.name;
      storeSubtitle.textContent = s.subtitle;
      const count = cart.reduce((sum, i) => sum + i.qty, 0);
      heroBadge.textContent = `${count} items · €${getCartSubtotal().toFixed(2)}`;
    }

    function renderGrid() {
      if (!activeCategoryId) {
        backToCategories.style.display = 'none';
        const categories = getFilteredCategories();
        grid.innerHTML = categories.map(category => `
          <button class="card" data-category="${category.id}">
            <div class="img-box">${category.image}</div>
            <div class="card-title">${category.name}</div>
            ${category.badge ? `<div class="pill">${category.badge}</div>` : ''}
          </button>
        `).join('');
        grid.querySelectorAll('.card').forEach(card => {
          card.onclick = () => {
            activeCategoryId = card.dataset.category;
            render();
          };
        });
      } else {
        backToCategories.style.display = 'inline-block';
        const products = getFilteredProducts();
        grid.innerHTML = products.map(product => `
          <div class="card product-card">
            <div class="img-box">${product.image}</div>
            <div class="card-title">${product.name}</div>
            <div class="product-price">€${product.price.toFixed(2)}</div>
            <button class="add-btn" data-add="${product.id}">Add to cart</button>
          </div>
        `).join('');
        grid.querySelectorAll('[data-add]').forEach(btn => {
          btn.onclick = () => {
            const id = Number(btn.dataset.add);
            const product = products.find(p => p.id === id);
            addToCart(product);
          };
        });
      }
    }

    function addToCart(product) {
      if (!product) return;
      const existing = cart.find(p => p.id === product.id);
      if (existing) existing.qty += 1;
      else cart.push({ ...product, qty: 1 });
      renderCartBar();
      renderDrawer();
      renderHero();
    }

    function updateQty(id, delta) {
      const item = cart.find(i => i.id === id);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
      renderCartBar();
      renderDrawer();
      renderHero();
    }

    function getCartSubtotal() {
      return cart.reduce((sum, item) => sum + item.price * item.qty, 0);
    }

    function renderCartBar() {
      const qty = cart.reduce((sum, i) => sum + i.qty, 0);
      const subtotal = getCartSubtotal();
      cartMeta.textContent = qty ? `${qty} items selected` : 'No items yet';
      cartTotal.textContent = `€${subtotal.toFixed(2)}`;
    }

    function renderDrawer() {
      cartItems.innerHTML = cart.length ? cart.map(item => `
        <div class="cart-item">
          <div class="cart-row">
            <div>
              <div style="font-weight:700;">${item.name}</div>
              <div style="color:#666;font-size:14px;">€${item.price.toFixed(2)}</div>
            </div>
            <div class="qty">
              <button data-minus="${item.id}">-</button>
              <strong>${item.qty}</strong>
              <button data-plus="${item.id}">+</button>
            </div>
          </div>
        </div>
      `).join('') : '<div style="color:#666;margin-bottom:10px;">Your cart is empty.</div>';

      cartItems.querySelectorAll('[data-minus]').forEach(btn => btn.onclick = () => updateQty(Number(btn.dataset.minus), -1));
      cartItems.querySelectorAll('[data-plus]').forEach(btn => btn.onclick = () => updateQty(Number(btn.dataset.plus), 1));

      tipGrid.innerHTML = [0,1,2,3,5].map(t => `
        <button class="${tip === t ? 'active' : ''}" data-tip="${t}">€${t}</button>
      `).join('');
      tipGrid.querySelectorAll('[data-tip]').forEach(btn => btn.onclick = () => {
        tip = Number(btn.dataset.tip);
        renderDrawer();
      });

      const subtotal = getCartSubtotal();
      const total = subtotal + DELIVERY_FEE + tip;
      sumItems.textContent = `€${subtotal.toFixed(2)}`;
      sumDelivery.textContent = `€${DELIVERY_FEE.toFixed(2)}`;
      sumTip.textContent = `€${tip.toFixed(2)}`;
      sumTotal.textContent = `€${total.toFixed(2)}`;
    }

    function openDrawer() { drawer.classList.add('show'); renderDrawer(); }
    function closeTheDrawer() { drawer.classList.remove('show'); }

    function sendWhatsAppOrder() {
      const subtotal = getCartSubtotal();
      if (subtotal < MIN_ORDER) {
        alert(`Minimum order is €${MIN_ORDER.toFixed(2)}`);
        return;
      }
      const name = document.getElementById('customerName').value.trim();
      const phone = document.getElementById('customerPhone').value.trim();
      const street = document.getElementById('customerStreet').value.trim();
      const floor = document.getElementById('customerFloor').value.trim();
      const apartment = document.getElementById('customerApartment').value.trim();
      const note = document.getElementById('customerNote').value.trim();
      const lines = cart.map(i => `- ${i.name} x${i.qty} = €${(i.price * i.qty).toFixed(2)}`);
      const total = subtotal + DELIVERY_FEE + tip;
      const message = [
        'New Door2Door Order',
        '',
        `Store: ${getActiveStore().name}`,
        `Name: ${name || '-'}`,
        `Phone: ${phone || '-'}`,
        `Street: ${street || '-'}`,
        `Floor: ${floor || '-'}`,
        `Apartment: ${apartment || '-'}`,
        '',
        'Items:',
        ...lines,
        '',
        `Items total: €${subtotal.toFixed(2)}`,
        `Delivery: €${DELIVERY_FEE.toFixed(2)}`,
        `Tip: €${tip.toFixed(2)}`,
        `Final total: €${total.toFixed(2)}`,
        `Note: ${note || '-'}`,
        '',
        'Regensburg only',
      ].join('\n');
      window.open(`https://wa.me/${PHONE}?text=${encodeURIComponent(message)}`, '_blank');
    }

    function render() {
      renderStoreTabs();
      renderHero();
      renderGrid();
      renderCartBar();
    }

    searchInput.addEventListener('input', (e) => {
      search = e.target.value;
      renderGrid();
    });
    backToCategories.onclick = () => {
      activeCategoryId = null;
      render();
    };
    continueBtn.onclick = openDrawer;
    closeDrawer.onclick = closeTheDrawer;
    drawer.addEventListener('click', (e) => {
      if (e.target === drawer) closeTheDrawer();
    });
    waBtn.onclick = sendWhatsAppOrder;

    render();
  </script>
</body>
</html>
